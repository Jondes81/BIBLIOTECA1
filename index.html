<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo Biblioteca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .modal { display: none; background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .input-padrao {
            width: 100%; border: 1px solid #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 0.5rem; 
            outline: none; transition: all 0.2s; background-color: #f8fafc;
        }
        .input-padrao:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); background-color: #ffffff; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col md:flex-row overflow-hidden">

    <aside class="w-full md:w-80 lg:w-96 bg-white shadow-[4px_0_24px_rgba(0,0,0,0.05)] flex flex-col h-full overflow-y-auto border-r border-slate-200 z-10 flex-shrink-0">
        <div class="p-6 border-b border-slate-100 bg-white sticky top-0 z-20">
            <h2 class="text-xl font-extrabold text-blue-600 flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center"><i class="fa-solid fa-book-open"></i></div>
                Gestão de Acervo
            </h2>
            <p class="text-sm text-slate-500 mt-1">Cadastre ou edite obras da biblioteca.</p>
        </div>
        
        <form id="formLivro" class="flex flex-col gap-4 p-6">
            <input type="hidden" id="livroId">
            <input type="hidden" id="capaBase64">

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-2 block">Código de Barras *</label>
                <div class="flex gap-2">
                    <input type="text" id="codigo" class="input-padrao flex-1" placeholder="Escaneie ou digite" required>
                    <button type="button" onclick="abrirScanner()" class="bg-blue-600 text-white w-10 h-10 rounded-lg hover:bg-blue-700 shadow-sm transition-colors flex items-center justify-center shrink-0" title="Escanear com Câmera">
                        <i class="fa-solid fa-barcode"></i>
                    </button>
                    <button type="button" onclick="gerarCodigo()" class="bg-slate-200 text-slate-700 w-10 h-10 rounded-lg hover:bg-slate-300 transition-colors flex items-center justify-center shrink-0" title="Gerar código aleatório">
                        <i class="fa-solid fa-bolt"></i>
                    </button>
                </div>
            </div>

            <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Título da Obra *</label><input type="text" id="titulo" class="input-padrao" required></div>
            <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Autor *</label><input type="text" id="autor" class="input-padrao" required></div>
            
            <div class="grid grid-cols-2 gap-4">
                <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Estoque *</label><input type="number" id="quantidade" class="input-padrao" required></div>
                <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Ano</label><input type="number" id="ano" class="input-padrao"></div>
                <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Editora</label><input type="text" id="editora" class="input-padrao"></div>
                <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Gênero</label><input type="text" id="genero" class="input-padrao" placeholder="Ex: Ficção..."></div>
                <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">ISBN</label><input type="text" id="isbn" class="input-padrao"></div>
                <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Localização</label><input type="text" id="local" class="input-padrao" placeholder="Ex: Estante A1"></div>
            </div>

            <div class="flex flex-col gap-2 mt-4">
                <button type="submit" id="btnSalvar" class="bg-emerald-600 text-white font-bold py-3 rounded-lg shadow hover:bg-emerald-700 transition-all flex items-center justify-center gap-2"><i class="fa-solid fa-floppy-disk"></i> Salvar Livro</button>
                <button type="button" onclick="limparFormulario()" class="bg-white border border-slate-300 text-slate-600 font-bold py-2 rounded-lg hover:bg-slate-50">Limpar Campos</button>
            </div>
        </form>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50 relative">
        <div class="p-6 pb-2 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 border-b border-slate-200 bg-white">
            <div class="w-full max-w-2xl">
                <h1 class="text-2xl font-bold text-slate-800 mb-4">📚 Livros no Acervo</h1>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="fa-solid fa-magnifying-glass text-slate-400"></i></div>
                    <input type="text" id="pesquisa" placeholder="Buscar por título, autor, gênero ou código..." class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 shadow-sm transition-all">
                </div>
            </div>
            <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-xl border border-slate-200">
                <button id="btnGrade" onclick="mudarVisualizacao('grade')" class="w-10 h-10 rounded-lg flex items-center justify-center transition-colors"><i class="fa-solid fa-table-cells-large"></i></button>
                <button id="btnLista" onclick="mudarVisualizacao('lista')" class="w-10 h-10 rounded-lg flex items-center justify-center transition-colors"><i class="fa-solid fa-list"></i></button>
            </div>
        </div>

        <div id="containerLivros" class="flex-1 p-6 overflow-y-auto"></div>
    </main>

    <div id="modalScanner" class="modal fixed inset-0 items-center justify-center z-[60]">
        <div class="bg-white rounded-2xl shadow-2xl p-6 flex flex-col items-center w-[450px] max-w-[95%]">
            <div class="w-full flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-slate-800">📷 Escanear Código</h3>
                <button onclick="fecharScanner()" class="w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-red-100 hover:text-red-600 flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="reader" class="w-full mb-4 bg-slate-100 rounded-lg overflow-hidden border border-slate-200 min-h-[250px]"></div>
        </div>
    </div>

    <div id="modalDetalhes" class="modal fixed inset-0 items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-[500px] max-w-[95%] flex flex-col max-h-[90vh]">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-xl font-bold text-slate-800">Ficha da Obra</h3>
                <button onclick="fecharModal('modalDetalhes')" class="text-slate-400 hover:text-slate-700 transition-colors text-2xl leading-none">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto flex flex-col sm:flex-row gap-6">
                <div class="flex flex-col items-center sm:w-1/3 shrink-0">
                    <div class="w-32 h-48 rounded-lg shadow-sm border border-slate-200 bg-slate-100 flex items-center justify-center overflow-hidden mb-3 relative group">
                        <img id="detCapa" src="" alt="Capa" class="object-cover w-full h-full hidden">
                        <div id="detCapaTexto" class="text-slate-400 font-semibold text-xs text-center p-2 flex flex-col items-center gap-2"><i class="fa-solid fa-image text-2xl"></i> SEM CAPA</div>
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-2">
                            <button onclick="document.getElementById('inputArquivoCapa').click()" class="bg-white/20 hover:bg-white/40 text-white p-2 rounded-full backdrop-blur-sm" title="Upload"><i class="fa-solid fa-upload"></i></button>
                            <button onclick="abrirCameraCapa()" class="bg-white/20 hover:bg-white/40 text-white p-2 rounded-full backdrop-blur-sm" title="Câmera"><i class="fa-solid fa-camera"></i></button>
                        </div>
                    </div>
                    <input type="file" id="inputArquivoCapa" accept="image/*" class="hidden" onchange="uploadArquivoCapa(event)">
                </div>
                <div class="flex-1 space-y-4">
                    <div><h4 id="detTitulo" class="text-xl font-bold text-slate-900 leading-tight"></h4><p id="detAutor" class="text-blue-600 font-medium text-sm"></p></div>
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <div class="bg-slate-50 p-2 rounded border border-slate-100"><span class="text-xs text-slate-500 block uppercase">Localização</span><span id="detLocal" class="font-semibold text-slate-800"></span></div>
                        <div class="bg-slate-50 p-2 rounded border border-slate-100"><span class="text-xs text-slate-500 block uppercase">Gênero</span><span id="detGenero" class="font-semibold text-slate-800"></span></div>
                        <div class="bg-slate-50 p-2 rounded border border-slate-100"><span class="text-xs text-slate-500 block uppercase">Ano</span><span id="detAno" class="font-semibold text-slate-800"></span></div>
                        <div class="bg-slate-50 p-2 rounded border border-slate-100"><span class="text-xs text-slate-500 block uppercase">Estoque</span><span id="detQtd" class="font-bold text-lg"></span></div>
                    </div>
                </div>
            </div>
            <div class="p-5 border-t border-slate-100 flex gap-3 bg-slate-50 rounded-b-2xl">
                <button onclick="prepararEdicao()" class="flex-1 bg-amber-500 text-white py-2.5 rounded-lg font-bold hover:bg-amber-600 flex justify-center items-center gap-2"><i class="fa-solid fa-pen"></i> Editar</button>
                <button onclick="excluirLivroAtual()" class="flex-1 bg-red-100 text-red-600 py-2.5 rounded-lg font-bold hover:bg-red-200 flex justify-center items-center gap-2"><i class="fa-solid fa-trash"></i> Excluir</button>
            </div>
        </div>
    </div>

    <div id="modalCameraCapa" class="modal fixed inset-0 items-center justify-center z-[70]">
        <div class="bg-white rounded-2xl p-6 flex flex-col items-center">
            <video id="videoCamera" class="w-full h-auto bg-black rounded-lg mb-4" autoplay playsinline></video>
            <div class="flex gap-4">
                <button onclick="capturarFoto()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">Capturar</button>
                <button onclick="fecharCameraCapa()" class="bg-slate-200 text-slate-600 px-6 py-2 rounded-lg font-bold">Cancelar</button>
            </div>
            <canvas id="canvasCamera" class="hidden"></canvas>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rotpcchkqqaxrgewrpoy.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvdHBjY2hrcXFheHJnZXdycG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDk5MzQsImV4cCI6MjA5MDk4NTkzNH0.Z5n-47ZPWCHD0G4WZAW8YNUh0fIVRD5JuBhsmxkXdJ8'; 
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let scanner = null, streamCamera = null, dadosLivroAtual = null;
        let modoExibicao = localStorage.getItem('modoExibicaoLivros') || 'grade';

        document.addEventListener('DOMContentLoaded', () => {
            mudarVisualizacao(modoExibicao);
            document.getElementById('pesquisa').addEventListener('input', (e) => carregarLivros(e.target.value));
            document.getElementById('formLivro').addEventListener('submit', salvarLivro);
        });

        // TODAS AS SUAS FUNÇÕES ORIGINAIS INTEGRANDO O CAMPO 'LOCAL'
        async function carregarLivros(termo = "") {
            let query = db.from('livros').select('*');
            if (termo) query = query.or(`titulo.ilike.%${termo}%,autor.ilike.%${termo}%,genero.ilike.%${termo}%,codigo_barra.ilike.%${termo}%`);
            const { data: livros, error } = await query.order('id', { ascending: false });
            if (error) return;

            const container = document.getElementById('containerLivros');
            container.innerHTML = '';
            container.className = modoExibicao === 'grade' 
                ? "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6"
                : "flex flex-col gap-3";

            livros.forEach(livro => {
                if (modoExibicao === 'grade') {
                    const card = document.createElement('div');
                    card.onclick = () => abrirDetalhes(livro);
                    card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-xl transition-all cursor-pointer group flex flex-col h-full";
                    card.innerHTML = `
                        <div class="aspect-[3/4] bg-slate-100 relative overflow-hidden shrink-0">
                            ${livro.capa ? `<img src="data:image/jpeg;base64,${livro.capa}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex flex-col items-center justify-center text-slate-300 gap-2"><i class="fa-solid fa-image text-4xl"></i><span class="text-[10px] font-bold uppercase tracking-widest">Sem Capa</span></div>`}
                            <div class="absolute top-2 right-2 bg-white/90 backdrop-blur px-2 py-1 rounded-lg text-[10px] font-black text-blue-600 shadow-sm">${livro.quantidade} UN</div>
                        </div>
                        <div class="p-4 flex flex-col flex-1">
                            <h4 class="font-bold text-slate-800 leading-tight mb-1 group-hover:text-blue-600 transition-colors line-clamp-2">${livro.titulo}</h4>
                            <p class="text-xs text-slate-500 mb-3">${livro.autor}</p>
                            <div class="mt-auto pt-3 border-t border-slate-50 flex justify-between items-center text-[10px] text-slate-400 font-bold uppercase tracking-tighter">
                                <span>${livro.genero || '---'}</span>
                                <span class="bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md">${livro.local || 'S/L'}</span>
                            </div>
                        </div>`;
                    container.appendChild(card);
                } else {
                    const item = document.createElement('div');
                    item.onclick = () => abrirDetalhes(livro);
                    item.className = "bg-white p-3 rounded-xl border border-slate-200 flex items-center gap-4 hover:bg-slate-50 transition-all cursor-pointer group";
                    item.innerHTML = `
                        <div class="w-10 h-14 bg-slate-100 rounded overflow-hidden shrink-0">
                            ${livro.capa ? `<img src="data:image/jpeg;base64,${livro.capa}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-300"><i class="fa-solid fa-image text-xs"></i></div>`}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-slate-800 text-sm truncate">${livro.titulo}</h4>
                            <p class="text-xs text-slate-500 truncate">${livro.autor} • ${livro.local || 'Sem Localização'}</p>
                        </div>
                        <div class="text-xs font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-lg">${livro.quantidade}</div>`;
                    container.appendChild(item);
                }
            });
        }

        async function salvarLivro(e) {
            e.preventDefault();
            const id = document.getElementById('livroId').value;
            const dados = {
                codigo_barra: document.getElementById('codigo').value,
                titulo: document.getElementById('titulo').value,
                autor: document.getElementById('autor').value,
                editora: document.getElementById('editora').value,
                ano: document.getElementById('ano').value || null,
                quantidade: parseInt(document.getElementById('quantidade').value),
                isbn: document.getElementById('isbn').value,
                genero: document.getElementById('genero').value,
                capa: document.getElementById('capaBase64').value,
                local: document.getElementById('local').value // SALVANDO LOCAL
            };
            let { error } = id ? await db.from('livros').update(dados).eq('id', id) : await db.from('livros').insert([dados]);
            if (error) alert("Erro: " + error.message); else { limparFormulario(); carregarLivros(); }
        }

        function abrirDetalhes(livro) {
            dadosLivroAtual = livro;
            document.getElementById('detTitulo').innerText = livro.titulo;
            document.getElementById('detAutor').innerText = livro.autor;
            document.getElementById('detAno').innerText = livro.ano || '---';
            document.getElementById('detGenero').innerText = livro.genero || '---';
            document.getElementById('detQtd').innerText = livro.quantidade;
            document.getElementById('detLocal').innerText = livro.local || 'Não informado'; // EXIBINDO LOCAL
            
            const img = document.getElementById('detCapa');
            const txt = document.getElementById('detCapaTexto');
            if (livro.capa) { img.src = "data:image/jpeg;base64," + livro.capa; img.classList.remove('hidden'); txt.classList.add('hidden'); }
            else { img.classList.add('hidden'); txt.classList.remove('hidden'); }
            
            document.getElementById('modalDetalhes').classList.add('active');
        }

        async function prepararEdicao() {
            const { data, error } = await db.from('livros').select('*').eq('id', dadosLivroAtual.id).single();
            if (error) return;
            document.getElementById('livroId').value = data.id;
            document.getElementById('codigo').value = data.codigo_barra;
            document.getElementById('titulo').value = data.titulo;
            document.getElementById('autor').value = data.autor;
            document.getElementById('editora').value = data.editora || "";
            document.getElementById('ano').value = data.ano || "";
            document.getElementById('quantidade').value = data.quantidade;
            document.getElementById('isbn').value = data.isbn || "";
            document.getElementById('genero').value = data.genero || "";
            document.getElementById('capaBase64').value = data.capa || "";
            document.getElementById('local').value = data.local || ""; // CARREGANDO LOCAL
            fecharModal('modalDetalhes');
        }

        // FUNÇÕES DE CÂMERA E SCANNER RESTAURADAS CONFORME ORIGINAL
        function abrirScanner() { document.getElementById('modalScanner').classList.add('active'); scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }); scanner.render((text) => { document.getElementById('codigo').value = text; fecharScanner(); }); }
        function fecharScanner() { if (scanner) scanner.clear(); document.getElementById('modalScanner').classList.remove('active'); }
        function gerarCodigo() { document.getElementById('codigo').value = 'LIB-' + Math.random().toString(36).substr(2, 9).toUpperCase(); }
        function mudarVisualizacao(modo) { modoExibicao = modo; localStorage.setItem('modoExibicaoLivros', modo); carregarLivros(document.getElementById('pesquisa').value); }
        function fecharModal(id) { document.getElementById(id).classList.remove('active'); }
        function limparFormulario() { document.getElementById('formLivro').reset(); document.getElementById('livroId').value = ""; document.getElementById('capaBase64').value = ""; }
        
        async function excluirLivroAtual() {
            if (confirm("Deseja excluir este livro?")) {
                const { error } = await db.from('livros').delete().eq('id', dadosLivroAtual.id);
                if (!error) { fecharModal('modalDetalhes'); carregarLivros(); }
            }
        }

        // LOGICA DE CAPA E CAMERA RESTAURADA
        async function uploadArquivoCapa(ev) { const f = ev.target.files[0], r = new FileReader(); r.onload = async (e) => { await salvarNovaCapa(e.target.result.split(',')[1]); }; r.readAsDataURL(f); }
        async function abrirCameraCapa() { fecharModal('modalDetalhes'); document.getElementById('modalCameraCapa').classList.add('active'); streamCamera = await navigator.mediaDevices.getUserMedia({ video: true }); document.getElementById('videoCamera').srcObject = streamCamera; }
        async function fecharCameraCapa() { if (streamCamera) streamCamera.getTracks().forEach(t => t.stop()); fecharModal('modalCameraCapa'); document.getElementById('modalDetalhes').classList.add('active'); }
        async function capturarFoto() { 
            const v = document.getElementById('videoCamera'), c = document.getElementById('canvasCamera');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            await salvarNovaCapa(c.toDataURL('image/jpeg').split(',')[1]);
            fecharCameraCapa();
        }
        async function salvarNovaCapa(b64) { 
            const { error } = await db.from('livros').update({ capa: b64 }).eq('id', dadosLivroAtual.id);
            if (!error) { carregarLivros(); alert("Capa atualizada!"); }
        }
    </script>
</body>
</html>
