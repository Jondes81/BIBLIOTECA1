<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acervo Biblioteca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Ajuste para telas mobile: evita que o h-screen quebre em alguns browsers */
        .h-dynamic { height: 100vh; height: 100dvh; }

        .modal { display: none; background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .input-padrao {
            width: 100%; border: 1px solid #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 0.5rem; 
            outline: none; transition: all 0.2s; background-color: #f8fafc; font-size: 16px; /* Evita zoom no iOS */
        }
        .input-padrao:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); background-color: #ffffff; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-dynamic flex flex-col md:flex-row overflow-hidden">

    <aside class="w-full md:w-80 lg:w-96 bg-white shadow-lg flex flex-col h-[40vh] md:h-full overflow-y-auto border-r border-slate-200 z-10 shrink-0">
        <div class="p-4 md:p-6 border-b border-slate-100 bg-white sticky top-0 z-20">
            <h2 class="text-lg md:text-xl font-extrabold text-blue-600 flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center"><i class="fa-solid fa-book-open"></i></div>
                Gestão
            </h2>
        </div>
        
        <form id="formLivro" class="flex flex-col gap-4 p-4 md:p-6">
            <input type="hidden" id="livroId">
            <input type="hidden" id="capaBase64">

            <div class="bg-slate-50 p-3 md:p-4 rounded-xl border border-slate-200">
                <label class="font-bold text-[10px] text-slate-600 uppercase tracking-wider mb-2 block">Código de Barras *</label>
                <div class="flex gap-2">
                    <input type="text" id="codigo" class="input-padrao flex-1" placeholder="Código" required>
                    <button type="button" onclick="abrirScanner()" class="bg-blue-600 text-white w-10 h-10 rounded-lg flex items-center justify-center shrink-0"><i class="fa-solid fa-barcode"></i></button>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div><label class="font-bold text-[10px] text-slate-600 uppercase tracking-wider mb-1 block">Título *</label><input type="text" id="titulo" class="input-padrao" required></div>
                <div><label class="font-bold text-[10px] text-slate-600 uppercase tracking-wider mb-1 block">Autor *</label><input type="text" id="autor" class="input-padrao" required></div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div><label class="font-bold text-[10px] text-slate-600 uppercase tracking-wider mb-1 block">Qtd *</label><input type="number" id="quantidade" class="input-padrao" required></div>
                <div><label class="font-bold text-[10px] text-slate-600 uppercase tracking-wider mb-1 block">Gênero</label><input type="text" id="genero" class="input-padrao"></div>
            </div>

            <button type="submit" id="btnSalvar" class="bg-emerald-600 text-white font-bold py-3 rounded-lg shadow hover:bg-emerald-700 transition-all flex items-center justify-center gap-2 mt-2">
                <i class="fa-solid fa-floppy-disk"></i> Salvar
            </button>
            <button type="button" onclick="limparFormulario()" class="text-xs text-slate-400 hover:text-slate-600 transition-colors">Limpar campos</button>
        </form>
    </aside>

    <main class="flex-1 flex flex-col min-h-0 bg-slate-50">
        <div class="p-4 md:p-6 pb-2 border-b border-slate-200 bg-white md:bg-transparent">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                <h1 class="text-xl font-bold text-slate-800">📚 Acervo</h1>
                <div class="flex items-center gap-2 bg-white p-1 rounded-lg border border-slate-200 shadow-sm">
                    <button id="btnGrade" onclick="mudarVisualizacao('grade')" class="p-2 rounded-md transition-colors"><i class="fa-solid fa-table-cells-large"></i></button>
                    <button id="btnLista" onclick="mudarVisualizacao('lista')" class="p-2 rounded-md transition-colors"><i class="fa-solid fa-list"></i></button>
                </div>
            </div>
            <div class="relative mt-4">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-magnifying-glass text-slate-400 text-sm"></i></div>
                <input type="text" id="pesquisa" placeholder="Pesquisar..." class="block w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 shadow-sm">
            </div>
        </div>

        <div id="containerLivros" class="flex-1 overflow-y-auto p-4 md:p-6">
            </div>
    </main>

    <div id="modalScanner" class="modal fixed inset-0 items-center justify-center z-[60] p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md">
            <div class="w-full flex justify-between items-center mb-4">
                <h3 class="font-bold text-slate-800">📷 Escanear</h3>
                <button onclick="fecharScanner()" class="text-slate-400 hover:text-red-500 text-xl">&times;</button>
            </div>
            <div id="reader" class="w-full bg-slate-100 rounded-lg overflow-hidden border border-slate-200"></div>
        </div>
    </div>

    <div id="modalDetalhes" class="modal fixed inset-0 items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-bold text-slate-800">Ficha Técnica</h3>
                <button onclick="fecharModal('modalDetalhes')" class="text-slate-400 text-2xl">&times;</button>
            </div>
            <div id="detalhesContent" class="p-4 md:p-6 overflow-y-auto">
                <div class="flex flex-col sm:flex-row gap-6">
                    <div class="flex flex-col items-center shrink-0">
                        <div class="w-32 h-44 rounded-lg bg-slate-100 border border-slate-200 flex items-center justify-center overflow-hidden mb-3">
                            <img id="detCapa" src="" class="hidden w-full h-full object-cover">
                            <div id="detCapaTexto" class="text-[10px] text-slate-400 font-bold text-center">SEM CAPA</div>
                        </div>
                        <div class="flex gap-1 w-full">
                            <label class="flex-1 bg-slate-100 text-[10px] font-bold p-2 rounded text-center cursor-pointer">
                                <i class="fa-solid fa-upload"></i>
                                <input type="file" accept="image/*" class="hidden" onchange="alterarCapaArquivo(event)">
                            </label>
                            <button onclick="abrirCameraCapa()" class="flex-1 bg-blue-50 text-blue-600 text-[10px] font-bold p-2 rounded"><i class="fa-solid fa-camera"></i></button>
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 id="detTitulo" class="text-lg font-bold text-slate-900 truncate"></h4>
                        <p id="detAutor" class="text-blue-600 text-sm mb-4"></p>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <div class="bg-slate-50 p-2 rounded"><span class="text-[9px] text-slate-400 block">ESTOQUE</span><span id="detQtd" class="font-bold"></span></div>
                            <div class="bg-slate-50 p-2 rounded"><span class="text-[9px] text-slate-400 block">GÊNERO</span><span id="detGenero" class="font-bold"></span></div>
                            <div class="bg-slate-50 p-2 rounded col-span-2"><span class="text-[9px] text-slate-400 block">CÓDIGO</span><span id="detCodigo" class="font-mono text-xs"></span></div>
                        </div>
                    </div>
                 </div>
            </div>
            <div class="p-4 border-t bg-slate-50 flex gap-2">
                <button onclick="prepararEdicao()" class="flex-1 bg-amber-500 text-white py-2 rounded-lg font-bold text-sm">Editar</button>
                <button onclick="excluirLivroAtual()" class="flex-1 bg-red-100 text-red-600 py-2 rounded-lg font-bold text-sm">Excluir</button>
            </div>
        </div>
    </div>

    <div id="modalCameraCapa" class="modal fixed inset-0 items-center justify-center z-[70] p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-4 flex flex-col items-center w-full max-w-xs">
            <div class="rounded-lg overflow-hidden bg-black mb-4 w-full aspect-[3/4]">
                <video id="videoCamera" class="w-full h-full object-cover" autoplay playsinline></video>
            </div>
            <canvas id="canvasCamera" class="hidden"></canvas>
            <div class="flex gap-2 w-full">
                <button onclick="capturarFoto()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-lg">Capturar</button>
                <button onclick="fecharCameraCapa()" class="flex-1 bg-slate-200 text-slate-700 py-3 rounded-lg">Sair</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES SUPABASE
        const SUPABASE_URL = 'https://rotpcchkqqaxrgewrpoy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvdHBjY2hrcXFheHJnZXdycG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDk5MzQsImV4cCI6MjA5MDk4NTkzNH0.Z5n-47ZPWCHD0G4WZAW8YNUh0fIVRD5JuBhsmxkXdJ8';
        
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dadosLivroAtual = null;
        let streamCamera = null;
        let leitorCodigoBarras = null;
        let modoExibicao = localStorage.getItem('modoExibicaoLivros') || 'grade'; 

        document.addEventListener('DOMContentLoaded', () => {
            mudarVisualizacao(modoExibicao);
            document.getElementById('pesquisa').addEventListener('input', (e) => carregarLivros(e.target.value));
            document.getElementById('formLivro').addEventListener('submit', salvarLivro);
        });

        function mudarVisualizacao(modo) {
            modoExibicao = modo;
            localStorage.setItem('modoExibicaoLivros', modo);
            const btnG = document.getElementById('btnGrade');
            const btnL = document.getElementById('btnLista');
            
            const activeClass = "bg-blue-100 text-blue-600 shadow-sm";
            const inactiveClass = "text-slate-400 hover:bg-slate-100";
            
            btnG.className = `p-2 rounded-md transition-colors ${modo === 'grade' ? activeClass : inactiveClass}`;
            btnL.className = `p-2 rounded-md transition-colors ${modo === 'lista' ? activeClass : inactiveClass}`;

            carregarLivros(document.getElementById('pesquisa').value);
        }

        async function carregarLivros(termo = "") {
            let query = db.from('livros').select('*');
            if (termo) query = query.or(`titulo.ilike.%${termo}%,autor.ilike.%${termo}%,genero.ilike.%${termo}%,codigo_barra.ilike.%${termo}%`);

            const { data: livros, error } = await query;
            const container = document.getElementById('containerLivros');
            container.innerHTML = ''; 

            if (!livros || livros.length === 0) {
                container.innerHTML = `<div class="h-full flex items-center justify-center text-slate-400 text-sm">Nenhum livro encontrado.</div>`;
                return;
            }

            container.className = modoExibicao === 'grade' 
                ? "flex-1 overflow-y-auto p-4 md:p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 gap-4 content-start"
                : "flex-1 overflow-y-auto p-4 md:p-6 flex flex-col gap-2 content-start";

            livros.forEach(livro => {
                const card = document.createElement('div');
                card.onclick = () => abrirDetalhes(livro);
                const imgSrc = livro.capa ? `data:image/png;base64,${livro.capa}` : null;

                if (modoExibicao === 'grade') {
                    card.className = "bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-3 cursor-pointer hover:shadow-md transition-all";
                    card.innerHTML = `
                        <div class="flex gap-3">
                            ${imgSrc ? `<img src="${imgSrc}" class="w-12 h-16 object-cover rounded shadow-sm">` : `<div class="w-12 h-16 bg-slate-50 rounded flex items-center justify-center text-[8px] text-slate-300 font-bold border border-slate-100">N/A</div>`}
                            <div class="min-w-0">
                                <h4 class="font-bold text-sm text-slate-800 truncate">${livro.titulo}</h4>
                                <p class="text-[11px] text-slate-500 truncate">${livro.autor}</p>
                                <span class="inline-block mt-2 text-[10px] font-bold px-2 py-0.5 rounded-full ${livro.quantidade > 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}">Qtd: ${livro.quantidade}</span>
                            </div>
                        </div>
                    `;
                } else {
                    card.className = "bg-white p-3 rounded-lg shadow-sm border border-slate-200 flex items-center gap-4 cursor-pointer hover:bg-slate-50";
                    card.innerHTML = `
                        <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 shrink-0"><i class="fa-solid fa-book text-xs"></i></div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-sm text-slate-800 truncate">${livro.titulo}</h4>
                            <p class="text-[10px] text-slate-400 truncate">${livro.autor} • ${livro.genero || 'Geral'}</p>
                        </div>
                        <span class="text-xs font-bold text-slate-600">${livro.quantidade}</span>
                    `;
                }
                container.appendChild(card);
            });
        }

        // FUNÇÕES AUXILIARES (MODAIS E CRUD)
        function abrirScanner() {
            document.getElementById('modalScanner').classList.add('active');
            leitorCodigoBarras = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 150} }, false);
            leitorCodigoBarras.render((texto) => { document.getElementById('codigo').value = texto; fecharScanner(); }, () => {});
        }
        function fecharScanner() { if (leitorCodigoBarras) leitorCodigoBarras.clear(); document.getElementById('modalScanner').classList.remove('active'); }
        
        async function salvarLivro(e) {
            e.preventDefault();
            const id = document.getElementById('livroId').value;
            const dados = { 
                codigo_barra: document.getElementById('codigo').value, 
                titulo: document.getElementById('titulo').value, 
                autor: document.getElementById('autor').value, 
                quantidade: parseInt(document.getElementById('quantidade').value), 
                genero: document.getElementById('genero').value,
                capa: document.getElementById('capaBase64').value 
            };
            const { error } = id ? await db.from('livros').update(dados).eq('id', id) : await db.from('livros').insert([dados]);
            if (error) alert("Erro ao salvar"); else { limparFormulario(); carregarLivros(); }
        }

        function abrirDetalhes(livro) {
            dadosLivroAtual = livro;
            document.getElementById('detTitulo').innerText = livro.titulo;
            document.getElementById('detAutor').innerText = livro.autor;
            document.getElementById('detQtd').innerText = livro.quantidade;
            document.getElementById('detGenero').innerText = livro.genero || '-';
            document.getElementById('detCodigo').innerText = livro.codigo_barra;
            const img = document.getElementById('detCapa');
            const txt = document.getElementById('detCapaTexto');
            if (livro.capa) { img.src = `data:image/png;base64,${livro.capa}`; img.classList.remove('hidden'); txt.classList.add('hidden'); }
            else { img.classList.add('hidden'); txt.classList.remove('hidden'); }
            document.getElementById('modalDetalhes').classList.add('active');
        }

        function fecharModal(id) { document.getElementById(id).classList.remove('active'); }
        function limparFormulario() { document.getElementById('formLivro').reset(); document.getElementById('livroId').value = ""; document.getElementById('capaBase64').value = ""; }

        async function excluirLivroAtual() {
            if (confirm("Excluir este livro?")) {
                await db.from('livros').delete().eq('id', dadosLivroAtual.id);
                fecharModal('modalDetalhes');
                carregarLivros();
            }
        }

        function prepararEdicao() {
            const l = dadosLivroAtual;
            document.getElementById('livroId').value = l.id;
            document.getElementById('codigo').value = l.codigo_barra;
            document.getElementById('titulo').value = l.titulo;
            document.getElementById('autor').value = l.autor;
            document.getElementById('quantidade').value = l.quantidade;
            document.getElementById('genero').value = l.genero || '';
            document.getElementById('capaBase64').value = l.capa || '';
            fecharModal('modalDetalhes');
        }

        // CÂMERA E CAPA
        async function abrirCameraCapa() {
            fecharModal('modalDetalhes');
            document.getElementById('modalCameraCapa').classList.add('active');
            streamCamera = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('videoCamera').srcObject = streamCamera;
        }
        function fecharCameraCapa() {
            if (streamCamera) streamCamera.getTracks().forEach(t => t.stop());
            fecharModal('modalCameraCapa');
            document.getElementById('modalDetalhes').classList.add('active');
        }
        async function capturarFoto() {
            const v = document.getElementById('videoCamera'), c = document.getElementById('canvasCamera');
            c.width = 300; c.height = 400;
            c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
            const b64 = c.toDataURL('image/jpeg', 0.7).split(',')[1];
            await db.from('livros').update({ capa: b64 }).eq('id', dadosLivroAtual.id);
            dadosLivroAtual.capa = b64;
            abrirDetalhes(dadosLivroAtual);
            fecharCameraCapa();
            carregarLivros();
        }
        async function alterarCapaArquivo(e) {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onload = async (ev) => {
                const b64 = ev.target.result.split(',')[1];
                await db.from('livros').update({ capa: b64 }).eq('id', dadosLivroAtual.id);
                dadosLivroAtual.capa = b64;
                abrirDetalhes(dadosLivroAtual);
                carregarLivros();
            };
            r.readAsDataURL(f);
        }
    </script>
</body>
</html>
