<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo Biblioteca Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col md:flex-row overflow-hidden">

    <aside class="w-full md:w-80 lg:w-96 bg-white shadow-xl flex flex-col h-full overflow-y-auto border-r border-slate-200 z-10 flex-shrink-0">
        <div class="p-6 border-b border-slate-100 sticky top-0 bg-white z-20">
            <h2 class="text-xl font-extrabold text-blue-600 flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center"><i class="fa-solid fa-book-open"></i></div>
                Gestão de Acervo
            </h2>
        </div>
        
        <form id="formLivro" class="flex flex-col gap-4 p-6">
            <input type="hidden" id="livroId">
            <input type="hidden" id="capaBase64">

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col items-center">
                <div class="w-24 h-32 rounded-lg shadow-sm border border-slate-200 bg-white overflow-hidden mb-3 relative group">
                    <img id="previewCapaForm" src="" alt="Capa" class="object-cover w-full h-full hidden">
                    <div id="previewCapaTexto" class="text-slate-400 font-semibold text-[10px] text-center p-2 flex flex-col items-center justify-center h-full"><i class="fa-solid fa-image text-xl mb-1"></i>SEM CAPA</div>
                </div>
                <div class="flex w-full gap-1">
                    <label class="flex-1 bg-white border border-slate-200 text-slate-700 py-1.5 rounded text-[10px] font-bold text-center cursor-pointer hover:bg-slate-50 transition">
                        <i class="fa-solid fa-upload"></i> ARQUIVO
                        <input type="file" id="inputArquivo" accept="image/*" class="hidden">
                    </label>
                    <button type="button" id="btnAbrirCameraForm" class="flex-1 bg-blue-50 text-blue-600 py-1.5 rounded text-[10px] font-bold hover:bg-blue-100 transition">
                        <i class="fa-solid fa-camera"></i> FOTO
                    </button>
                    <button type="button" id="btnRemoverCapa" class="w-8 bg-red-50 text-red-500 py-1.5 rounded text-[10px] hover:bg-red-100 transition"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-2 block">Código de Barras *</label>
                <div class="flex gap-2">
                    <input type="text" id="codigo" class="input-padrao flex-1" placeholder="Escanear..." required>
                    <button type="button" id="btnScan" class="bg-blue-600 text-white w-10 h-10 rounded-lg hover:bg-blue-700 transition flex items-center justify-center shrink-0"><i class="fa-solid fa-barcode"></i></button>
                    <button type="button" id="btnGerarCodigo" class="bg-slate-200 text-slate-700 w-10 h-10 rounded-lg hover:bg-slate-300 transition flex items-center justify-center shrink-0"><i class="fa-solid fa-bolt"></i></button>
                </div>
            </div>

            <div>
                <label class="label-form">ISBN (Preenchimento Automático)</label>
                <input type="text" id="isbn" class="input-padrao" placeholder="ISBN-10 ou ISBN-13">
            </div>

            <div class="space-y-3">
                <div><label class="label-form">Título *</label><input type="text" id="titulo" class="input-padrao" required></div>
                <div><label class="label-form">Autor *</label><input type="text" id="autor" class="input-padrao" required></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="label-form">Estoque *</label><input type="number" id="quantidade" class="input-padrao" required></div>
                    <div><label class="label-form">Ano</label><input type="number" id="ano" class="input-padrao"></div>
                    <div><label class="label-form">Editora</label><input type="text" id="editora" class="input-padrao"></div>
                    <div><label class="label-form">Gênero</label><input type="text" id="genero" class="input-padrao"></div>
                    <div class="col-span-2"><label class="label-form">Localização</label><input type="text" id="local" class="input-padrao"></div>
                </div>
            </div>

            <div class="flex flex-col gap-2 mt-4">
                <button type="submit" id="btnSalvar" class="bg-emerald-600 text-white font-bold py-3 rounded-lg shadow hover:bg-emerald-700 transition-all flex items-center justify-center gap-2"><i class="fa-solid fa-floppy-disk"></i> Salvar Livro</button>
                <button type="button" id="btnLimpar" class="bg-white border border-slate-300 text-slate-600 font-bold py-2 rounded-lg hover:bg-slate-50 transition-colors">Limpar Campos</button>
            </div>
        </form>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50">
        <header class="p-6 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
            <div class="w-full max-w-2xl">
                <h1 class="text-2xl font-bold text-slate-800 mb-4">📚 Livros no Acervo</h1>
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="pesquisa" placeholder="Buscar por título, autor, gênero ou código..." class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>
            <div class="flex items-center gap-2 bg-white p-1 rounded-xl border border-slate-200 shadow-sm">
                <button id="btnGrade" class="w-10 h-10 rounded-lg flex items-center justify-center transition-colors"><i class="fa-solid fa-table-cells-large"></i></button>
                <button id="btnLista" class="w-10 h-10 rounded-lg flex items-center justify-center transition-colors"><i class="fa-solid fa-list"></i></button>
            </div>
        </header>

        <div id="containerLivros" class="flex-1 p-6 overflow-y-auto"></div>
    </main>

    <div id="modalScanner" class="modal">
        <div class="bg-white rounded-2xl p-6 w-[450px] max-w-[95%]">
            <div class="flex justify-between mb-4">
                <h3 class="text-xl font-bold">📷 Escanear Código</h3>
                <button onclick="fecharModal('modalScanner')" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div id="reader" class="w-full bg-slate-100 rounded-lg overflow-hidden min-h-[250px]"></div>
        </div>
    </div>

    <div id="modalDetalhes" class="modal">
        <div class="bg-white rounded-2xl shadow-2xl w-[500px] max-w-[95%] overflow-hidden">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50">
                <h3 class="font-bold">Ficha da Obra</h3>
                <button onclick="fecharModal('modalDetalhes')" class="text-2xl">&times;</button>
            </div>
            <div id="detalhesConteudo" class="p-6"></div>
            <div class="p-5 border-t flex gap-3 bg-slate-50">
                <button id="btnEditarFicha" class="flex-1 bg-amber-500 text-white py-2.5 rounded-lg font-bold hover:bg-amber-600 transition">Editar</button>
                <button id="btnExcluirFicha" class="flex-1 bg-red-100 text-red-600 py-2.5 rounded-lg font-bold hover:bg-red-200 transition">Excluir</button>
            </div>
        </div>
    </div>

    <div id="modalCamera" class="modal">
        <div class="bg-white rounded-2xl p-6 flex flex-col items-center">
            <video id="videoCamera" class="w-64 h-80 bg-black object-cover rounded-lg mb-4" autoplay playsinline></video>
            <canvas id="canvasCamera" class="hidden"></canvas>
            <div class="flex gap-3 w-full">
                <button id="btnCapturarFoto" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700">Capturar</button>
                <button onclick="fecharModal('modalCamera')" class="flex-1 bg-slate-200 py-3 rounded-lg">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js?v=novaVersaoDefinitiva"></script>
</body>
</html>
