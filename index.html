<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo Biblioteca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .modal { display: none; background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .input-padrao {
            width: 100%; border: 1px solid #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 0.5rem; 
            outline: none; transition: all 0.2s; background-color: #f8fafc;
        }
        .input-padrao:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); background-color: #ffffff; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col md:flex-row overflow-hidden">

    <aside class="w-full md:w-80 lg:w-96 bg-white shadow-[4px_0_24px_rgba(0,0,0,0.05)] flex flex-col h-full overflow-y-auto border-r border-slate-200 z-10 flex-shrink-0">
        <div class="p-6 border-b border-slate-100 bg-white sticky top-0 z-20">
            <h2 class="text-xl font-extrabold text-blue-600 flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center"><i class="fa-solid fa-book-open"></i></div>
                Gestão de Acervo
            </h2>
            <p class="text-sm text-slate-500 mt-1">Cadastre ou edite obras da biblioteca.</p>
        </div>
        
        <form id="formLivro" class="flex flex-col gap-4 p-6">
            <input type="hidden" id="livroId">
            <input type="hidden" id="capaBase64">

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col items-center">
                <label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-2 block w-full text-left">Capa da Obra (Opcional)</label>
                <div class="w-24 h-32 rounded-lg shadow-sm border border-slate-200 bg-white flex items-center justify-center overflow-hidden mb-3 relative group">
                    <img id="previewCapaForm" src="" alt="Capa" class="object-cover w-full h-full hidden">
                    <div id="previewCapaTexto" class="text-slate-400 font-semibold text-xs text-center p-2 flex flex-col items-center gap-1"><i class="fa-solid fa-image text-xl"></i><br>SEM CAPA</div>
                </div>
                <div class="flex w-full gap-1">
                    <label class="flex-1 bg-white border border-slate-200 text-slate-700 py-1.5 rounded text-xs font-bold text-center cursor-pointer hover:bg-slate-50 transition" title="Enviar Arquivo">
                        <i class="fa-solid fa-upload"></i> Arquivo
                        <input type="file" accept="image/*" class="hidden" onchange="carregarCapaFormulario(event)">
                    </label>
                    <button type="button" onclick="abrirCamera('formulario')" class="flex-1 bg-blue-50 text-blue-600 py-1.5 rounded text-xs font-bold hover:bg-blue-100 transition" title="Tirar Foto">
                        <i class="fa-solid fa-camera"></i> Foto
                    </button>
                    <button type="button" onclick="atualizarPreviewForm(null)" class="w-8 bg-red-50 text-red-500 py-1.5 rounded text-xs font-bold hover:bg-red-100 transition" title="Remover Capa">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </div>
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-2 block">Código de Barras *</label>
                <div class="flex gap-2">
                    <input type="text" id="codigo" class="input-padrao flex-1" placeholder="Escaneie ou digite" required>
                    <button type="button" onclick="abrirScanner()" class="bg-blue-600 text-white w-10 h-10 rounded-lg hover:bg-blue-700 shadow-sm transition-colors flex items-center justify-center shrink-0" title="Escanear com Câmera">
                        <i class="fa-solid fa-barcode"></i>
                    </button>
                    <button type="button" onclick="gerarCodigo()" class="bg-slate-200 text-slate-700 w-10 h-10 rounded-lg hover:bg-slate-300 transition-colors flex items-center justify-center shrink-0" title="Gerar código aleatório">
                        <i class="fa-solid fa-bolt"></i>
                    </button>
                </div>
            </div>

            <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Título da Obra *</label><input type="text" id="titulo" class="input-padrao" required></div>
            <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Autor *</label><input type="text" id="autor" class="input-padrao" required></div>
            
            <div class="grid grid-cols-2 gap-4">
                <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Estoque *</label><input type="number" id="quantidade" class="input-padrao" required></div>
                <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Ano</label><input type="number" id="ano" class="input-padrao"></div>
                <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Editora</label><input type="text" id="editora" class="input-padrao"></div>
                <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Gênero</label><input type="text" id="genero" class="input-padrao" placeholder="Ex: Ficção, Didático..."></div>
                <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">ISBN</label><input type="text" id="isbn" class="input-padrao"></div>
                <div><label class="font-bold text-xs text-slate-600 uppercase tracking-wider mb-1 block">Localização</label><input type="text" id="local" class="input-padrao"></div>
            </div>

            <div class="flex flex-col gap-2 mt-4">
                <button type="submit" id="btnSalvar" class="bg-emerald-600 text-white font-bold py-3 rounded-lg shadow hover:bg-emerald-700 hover:shadow-md transition-all flex items-center justify-center gap-2"><i class="fa-solid fa-floppy-disk"></i> Salvar Livro</button>
                <button type="button" onclick="limparFormulario()" class="bg-white border border-slate-300 text-slate-600 font-bold py-2 rounded-lg hover:bg-slate-50 transition-colors">Limpar Campos</button>
            </div>
        </form>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50 relative">
        <div class="p-6 pb-2 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 border-b border-slate-200">
            <div class="w-full max-w-2xl">
                <h1 class="text-2xl font-bold text-slate-800 mb-4">📚 Livros no Acervo</h1>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="fa-solid fa-magnifying-glass text-slate-400"></i></div>
                    <input type="text" id="pesquisa" placeholder="Buscar por título, autor, gênero ou código..." class="block w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 shadow-sm text-slate-700 placeholder-slate-400 transition-all">
                </div>
            </div>
            
            <div class="flex items-center gap-2 bg-white p-1 rounded-xl border border-slate-200 shadow-sm shrink-0 mb-1">
                <button id="btnGrade" onclick="mudarVisualizacao('grade')" class="w-10 h-10 rounded-lg flex items-center justify-center transition-colors" title="Ver em Grade">
                    <i class="fa-solid fa-table-cells-large"></i>
                </button>
                <button id="btnLista" onclick="mudarVisualizacao('lista')" class="w-10 h-10 rounded-lg flex items-center justify-center transition-colors" title="Ver em Lista">
                    <i class="fa-solid fa-list"></i>
                </button>
            </div>
        </div>

        <div id="containerLivros" class="flex-1 p-6 overflow-y-auto">
        </div>
    </main>

    <div id="modalScanner" class="modal fixed inset-0 items-center justify-center z-[60]">
        <div class="bg-white rounded-2xl shadow-2xl p-6 flex flex-col items-center w-[450px] max-w-[95%]">
            <div class="w-full flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-slate-800">📷 Escanear Código</h3>
                <button onclick="fecharScanner()" class="w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-red-100 hover:text-red-600 flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="reader" class="w-full mb-4 bg-slate-100 rounded-lg overflow-hidden border border-slate-200 min-h-[250px]"></div>
            <p class="text-sm text-slate-500 text-center mb-4">Aponte a câmera para o código de barras do livro. Mantenha a imagem nítida.</p>
        </div>
    </div>

    <div id="modalDetalhes" class="modal fixed inset-0 items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-[500px] max-w-[95%] flex flex-col max-h-[90vh]">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-xl font-bold text-slate-800">Ficha da Obra</h3>
                <button onclick="fecharModal('modalDetalhes')" class="text-slate-400 hover:text-slate-700 transition-colors text-2xl leading-none">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto flex flex-col sm:flex-row gap-6">
                <div class="flex flex-col items-center sm:w-1/3 shrink-0">
                    <div class="w-32 h-48 rounded-lg shadow-sm border border-slate-200 bg-slate-100 flex items-center justify-center overflow-hidden mb-3 relative group">
                        <img id="detCapa" src="" alt="Capa" class="object-cover w-full h-full hidden">
                        <div id="detCapaTexto" class="text-slate-400 font-semibold text-xs text-center p-2 flex flex-col items-center gap-2"><i class="fa-solid fa-image text-2xl"></i> SEM CAPA</div>
                    </div>
                    <div class="flex w-full gap-1">
                        <label class="flex-1 bg-slate-100 text-slate-700 py-1.5 rounded text-xs font-bold text-center cursor-pointer hover:bg-slate-200 transition" title="Enviar Arquivo">
                            <i class="fa-solid fa-upload"></i> Arquivo
                            <input type="file" accept="image/*" class="hidden" onchange="alterarCapaArquivo(event)">
                        </label>
                        <button onclick="abrirCamera('detalhes')" class="flex-1 bg-blue-50 text-blue-600 py-1.5 rounded text-xs font-bold hover:bg-blue-100 transition" title="Tirar Foto">
                            <i class="fa-solid fa-camera"></i> Foto
                        </button>
                    </div>
                </div>
                <div class="flex-1 space-y-4">
                    <div><h4 id="detTitulo" class="text-xl font-bold text-slate-900 leading-tight"></h4><p id="detAutor" class="text-blue-600 font-medium text-sm"></p></div>
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <div class="bg-slate-50 p-2 rounded border border-slate-100"><span class="text-xs text-slate-500 block uppercase">Gênero</span><span id="detGenero" class="font-semibold text-slate-800"></span></div>
                        <div class="bg-slate-50 p-2 rounded border border-slate-100"><span class="text-xs text-slate-500 block uppercase">Estoque</span><span id="detQtd" class="font-bold text-lg"></span></div>
                        <div class="bg-slate-50 p-2 rounded border border-slate-100 col-span-2 flex justify-between items-center">
                            <div><span class="text-xs text-slate-500 block uppercase">Código de Barras</span><span id="detCodigo" class="font-mono text-slate-800"></span></div>
                            <i class="fa-solid fa-barcode text-2xl text-slate-300"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="p-5 border-t border-slate-100 flex gap-3 bg-slate-50 rounded-b-2xl">
                <button onclick="prepararEdicao()" class="flex-1 bg-amber-500 text-white py-2.5 rounded-lg font-bold shadow-sm hover:bg-amber-600 transition-colors flex justify-center items-center gap-2"><i class="fa-solid fa-pen"></i> Editar Ficha</button>
                <button onclick="excluirLivroAtual()" class="flex-1 bg-red-100 text-red-600 py-2.5 rounded-lg font-bold hover:bg-red-200 transition-colors flex justify-center items-center gap-2"><i class="fa-solid fa-trash"></i> Excluir</button>
            </div>
        </div>
    </div>

    <div id="modalCameraCapa" class="modal fixed inset-0 items-center justify-center z-[60]">
        <div class="bg-white rounded-2xl shadow-2xl p-6 flex flex-col items-center">
            <h3 class="text-xl font-bold mb-4 text-slate-800">📸 Enquadre a Capa</h3>
            <div class="rounded-lg overflow-hidden border-4 border-slate-200 mb-4 shadow-inner relative">
                <video id="videoCamera" class="w-64 h-80 bg-black object-cover" autoplay playsinline></video>
                <div class="absolute inset-0 border-2 border-white/50 m-4 rounded pointer-events-none"></div>
            </div>
            <canvas id="canvasCamera" class="hidden"></canvas>
            <div class="flex gap-3 w-full">
                <button onclick="capturarFoto()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 shadow-sm transition-colors">Capturar</button>
                <button onclick="fecharCameraCapa()" class="flex-1 bg-slate-200 text-slate-700 font-bold py-3 rounded-lg hover:bg-slate-300 transition-colors">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // 🛑🛑🛑 CONFIGURE O SUPABASE AQUI 🛑🛑🛑
        const SUPABASE_URL = 'https://rotpcchkqqaxrgewrpoy.supabase.co'; // Ex: https://xyz.supabase.co
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvdHBjY2hrcXFheHJnZXdycG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDk5MzQsImV4cCI6MjA5MDk4NTkzNH0.Z5n-47ZPWCHD0G4WZAW8YNUh0fIVRD5JuBhsmxkXdJ8'; // O token longo anon/public
        
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dadosLivroAtual = null;
        let streamCamera = null;
        let leitorCodigoBarras = null;
        let contextoCamera = 'detalhes'; // NOVA VARIÁVEL PARA O CONTROLE DA CÂMERA
        
        // RECUPERA A PREFERÊNCIA DO USUÁRIO OU DEFINE GRADE COMO PADRÃO
        let modoExibicao = localStorage.getItem('modoExibicaoLivros') || 'grade'; 

        document.addEventListener('DOMContentLoaded', () => {
            mudarVisualizacao(modoExibicao); // Aplica a visualização escolhida
            document.getElementById('pesquisa').addEventListener('input', (e) => carregarLivros(e.target.value));
            document.getElementById('formLivro').addEventListener('submit', salvarLivro);
        });

        // --- SISTEMA DE VISUALIZAÇÃO (GRADE VS LISTA) ---
        function mudarVisualizacao(modo) {
            modoExibicao = modo;
            localStorage.setItem('modoExibicaoLivros', modo);

            const btnGrade = document.getElementById('btnGrade');
            const btnLista = document.getElementById('btnLista');

            if (modo === 'grade') {
                btnGrade.className = "w-10 h-10 rounded-lg flex items-center justify-center transition-colors bg-blue-100 text-blue-600 shadow-sm";
                btnLista.className = "w-10 h-10 rounded-lg flex items-center justify-center transition-colors text-slate-400 hover:bg-slate-100";
            } else {
                btnLista.className = "w-10 h-10 rounded-lg flex items-center justify-center transition-colors bg-blue-100 text-blue-600 shadow-sm";
                btnGrade.className = "w-10 h-10 rounded-lg flex items-center justify-center transition-colors text-slate-400 hover:bg-slate-100";
            }

            carregarLivros(document.getElementById('pesquisa').value);
        }

        // --- CRUD BANCO DE DADOS ---
        async function carregarLivros(termo = "") {
            let query = db.from('livros').select('id, titulo, autor, quantidade, codigo_barra, capa, genero');
            if (termo) query = query.or(`titulo.ilike.%${termo}%,autor.ilike.%${termo}%,genero.ilike.%${termo}%,codigo_barra.ilike.%${termo}%`);

            const { data: livros, error } = await query;
            if (error) return alert("Erro ao carregar livros!");

            const container = document.getElementById('containerLivros');
            container.innerHTML = ''; 

            if(livros.length === 0) {
                container.className = "flex-1 p-6 overflow-y-auto flex items-center justify-center";
                container.innerHTML = `<div class="flex flex-col items-center justify-center text-slate-400"><i class="fa-solid fa-book-open-reader text-6xl mb-4 opacity-50"></i><p>Nenhum livro encontrado.</p></div>`;
                return;
            }

            // CORREÇÃO: Mantém as classes "flex-1 p-6 overflow-y-auto" em ambos os modos para garantir o Scroll!
            if (modoExibicao === 'grade') {
                container.className = "flex-1 p-6 overflow-y-auto grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-5 content-start";
            } else {
                container.className = "flex-1 p-6 overflow-y-auto flex flex-col gap-3 content-start";
            }

            livros.forEach(livro => {
                const emEstoque = livro.quantidade > 0;
                const corBadge = emEstoque ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-red-100 text-red-700 border-red-200';
                const iconeBadge = emEstoque ? 'fa-check' : 'fa-xmark';
                const imgSrc = livro.capa ? `data:image/png;base64,${livro.capa}` : '';

                const card = document.createElement('div');
                card.onclick = () => abrirDetalhes(livro);

                if (modoExibicao === 'grade') {
                    const imgTag = livro.capa 
                        ? `<img src="${imgSrc}" class="w-16 h-24 object-cover rounded shadow-sm border border-slate-200 shrink-0">` 
                        : `<div class="w-16 h-24 bg-slate-100 border border-slate-200 rounded shadow-sm flex flex-col items-center justify-center text-[10px] text-slate-400 font-bold shrink-0"><i class="fa-solid fa-image text-lg mb-1"></i>SEM FOTO</div>`;
                    
                    card.className = "bg-white p-4 rounded-xl shadow-sm hover:shadow-md cursor-pointer border border-slate-200 flex items-start gap-4 transition-all group";
                    card.innerHTML = `
                        ${imgTag}
                        <div class="flex-1 min-w-0 flex flex-col justify-between h-full">
                            <div>
                                <h4 class="font-bold text-slate-800 text-base leading-tight truncate group-hover:text-blue-600 transition-colors">${livro.titulo}</h4>
                                <p class="text-sm text-slate-500 truncate mt-1"><i class="fa-solid fa-pen-nib w-4 text-slate-300"></i> ${livro.autor}</p>
                                <p class="text-xs text-slate-400 truncate mt-0.5"><i class="fa-solid fa-tag w-4 text-slate-300"></i> ${livro.genero || 'Sem gênero'}</p>
                            </div>
                            <div class="mt-3 flex items-center justify-between border-t border-slate-50 pt-3">
                                <span class="text-xs font-mono text-slate-400 bg-slate-100 px-2 py-1 rounded">${livro.codigo_barra}</span>
                                <span class="text-xs font-bold px-2.5 py-1 rounded-full border ${corBadge} flex items-center gap-1 shadow-sm"><i class="fa-solid ${iconeBadge}"></i> Qtd: ${livro.quantidade}</span>
                            </div>
                        </div>
                    `;
                } else {
                    const imgTag = livro.capa 
                        ? `<img src="${imgSrc}" class="w-10 h-10 object-cover rounded-full shadow-sm border border-slate-200 shrink-0">` 
                        : `<div class="w-10 h-10 bg-slate-100 border border-slate-200 rounded-full shadow-sm flex items-center justify-center text-[10px] text-slate-400 shrink-0"><i class="fa-solid fa-image"></i></div>`;
                    
                    card.className = "bg-white p-3 rounded-lg shadow-sm hover:shadow-md cursor-pointer border border-slate-200 flex items-center gap-4 transition-all group";
                    card.innerHTML = `
                        ${imgTag}
                        <div class="flex-1 grid grid-cols-1 sm:grid-cols-12 gap-2 sm:gap-4 items-center min-w-0">
                            <div class="col-span-1 sm:col-span-5 min-w-0">
                                <h4 class="font-bold text-slate-800 text-sm truncate group-hover:text-blue-600 transition-colors">${livro.titulo}</h4>
                                <p class="text-xs text-slate-500 truncate">${livro.autor}</p>
                            </div>
                            <div class="col-span-1 sm:col-span-3 text-xs text-slate-500 truncate hidden sm:block"><i class="fa-solid fa-tag w-4 text-slate-300"></i> ${livro.genero || 'N/A'}</div>
                            <div class="col-span-1 sm:col-span-2 text-xs font-mono text-slate-400 truncate hidden sm:block"><i class="fa-solid fa-barcode w-4 text-slate-300"></i> ${livro.codigo_barra}</div>
                            <div class="col-span-1 sm:col-span-2 flex justify-end">
                                <span class="text-xs font-bold px-2 py-1 rounded-full border ${corBadge} flex items-center gap-1"><i class="fa-solid ${iconeBadge}"></i> Qtd: ${livro.quantidade}</span>
                            </div>
                        </div>
                    `;
                }
                container.appendChild(card);
            });
        }

        // ================= (RESTANTE DO CÓDIGO) =================
        function abrirScanner() {
            document.getElementById('modalScanner').classList.add('active');
            leitorCodigoBarras = new Html5QrcodeScanner("reader", { fps: 15, qrbox: {width: 300, height: 100}, videoConstraints: { facingMode: "environment", advanced: [{ focusMode: "continuous" }] } }, false);
            leitorCodigoBarras.render((texto) => { document.getElementById('codigo').value = texto; fecharScanner(); new Audio('https://www.soundjay.com/buttons/sounds/beep-07a.mp3').play().catch(()=>{}); }, () => {});
        }
        function fecharScanner() { if (leitorCodigoBarras) { leitorCodigoBarras.clear(); leitorCodigoBarras = null; } document.getElementById('modalScanner').classList.remove('active'); }

        async function salvarLivro(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar'); const textoOriginal = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...'; btn.disabled = true;
            const id = document.getElementById('livroId').value;
            const dados = { codigo_barra: document.getElementById('codigo').value, titulo: document.getElementById('titulo').value, autor: document.getElementById('autor').value, editora: document.getElementById('editora').value, ano: document.getElementById('ano').value || null, quantidade: parseInt(document.getElementById('quantidade').value), isbn: document.getElementById('isbn').value, genero: document.getElementById('genero').value, capa: document.getElementById('capaBase64').value, local: document.getElementById('local').value };
            let error = id ? (await db.from('livros').update(dados).eq('id', id)).error : (await db.from('livros').insert([dados])).error;
            btn.innerHTML = textoOriginal; btn.disabled = false;
            if (error) alert("Erro: " + error.message); else { limparFormulario(); carregarLivros(document.getElementById('pesquisa').value); }
        }

        function abrirDetalhes(livro) {
            dadosLivroAtual = livro; 
            document.getElementById('detTitulo').innerText = livro.titulo; document.getElementById('detAutor').innerText = livro.autor; document.getElementById('detGenero').innerText = livro.genero || '-'; document.getElementById('detQtd').innerText = livro.quantidade; document.getElementById('detCodigo').innerText = livro.codigo_barra;
            document.getElementById('detQtd').className = livro.quantidade > 0 ? "font-bold text-2xl text-emerald-600" : "font-bold text-2xl text-red-600";
            atualizarCapaVisual(livro.capa); document.getElementById('modalDetalhes').classList.add('active');
        }

        function atualizarCapaVisual(base64) {
            const imgEl = document.getElementById('detCapa'); const txtEl = document.getElementById('detCapaTexto');
            if (base64) { imgEl.src = `data:image/png;base64,${base64}`; imgEl.classList.remove('hidden'); txtEl.classList.add('hidden'); } 
            else { imgEl.src = ""; imgEl.classList.add('hidden'); txtEl.classList.remove('hidden'); }
        }

        async function excluirLivroAtual() {
            if (!confirm(`Excluir a obra '${dadosLivroAtual.titulo}'?`)) return;
            const { error } = await db.from('livros').delete().eq('id', dadosLivroAtual.id);
            if (error) alert("Erro ao excluir!"); else { fecharModal('modalDetalhes'); carregarLivros(document.getElementById('pesquisa').value); }
        }

        async function prepararEdicao() {
            const { data, error } = await db.from('livros').select('*').eq('id', dadosLivroAtual.id).single();
            if(error) return alert("Erro ao buscar os dados completos do livro.");
            
            document.getElementById('livroId').value = data.id;
            
            ['codigo_barra', 'titulo', 'autor', 'editora', 'ano', 'quantidade', 'isbn', 'genero', 'capa','local'].forEach(c => { 
                const idDoCampo = (c === 'codigo_barra') ? 'codigo' : (c === 'capa') ? 'capaBase64' : c;
                const campoHtml = document.getElementById(idDoCampo);
                
                if (campoHtml) {
                    campoHtml.value = (data[c] !== null && data[c] !== undefined) ? data[c] : ''; 
                }
            });

            atualizarPreviewForm(data.capa); // ATUALIZA A VISUALIZAÇÃO DA CAPA NO FORMULÁRIO TAMBÉM

            if (data.editora || data.isbn || data.genero) {
                const detalhesAba = document.querySelector('details.group');
                if (detalhesAba) detalhesAba.open = true;
            }

            const btn = document.getElementById('btnSalvar'); 
            btn.innerHTML = '<i class="fa-solid fa-pen"></i> Atualizar Livro'; 
            btn.className = "bg-amber-500 text-white font-bold py-3 rounded-lg shadow hover:bg-amber-600 transition-all flex items-center justify-center gap-2";
            
            fecharModal('modalDetalhes');
        }

        function gerarCodigo() { document.getElementById('codigo').value = "LIB" + Math.floor(100000 + Math.random() * 900000); }
        
        function limparFormulario() { 
            document.getElementById('formLivro').reset(); document.getElementById('livroId').value = ""; document.getElementById('capaBase64').value = ""; 
            atualizarPreviewForm(null); // LIMPA A IMAGEM DO FORMULÁRIO
            const btn = document.getElementById('btnSalvar'); btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Salvar Livro'; btn.className = "bg-emerald-600 text-white font-bold py-3 rounded-lg shadow hover:bg-emerald-700 transition-all flex items-center justify-center gap-2"; 
        }
        function fecharModal(id) { document.getElementById(id).classList.remove('active'); }

        async function alterarCapaArquivo(e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = async (ev) => await salvarNovaCapa(ev.target.result.split(',')[1]); r.readAsDataURL(f); }

        // --- NOVAS FUNÇÕES PARA A CAPA NO FORMULÁRIO ---
        function carregarCapaFormulario(e) {
            const f = e.target.files[0]; 
            if (!f) return; 
            const r = new FileReader(); 
            r.onload = (ev) => { 
                const b64 = ev.target.result.split(',')[1]; 
                document.getElementById('capaBase64').value = b64; 
                atualizarPreviewForm(b64); 
            }; 
            r.readAsDataURL(f);
        }

        function atualizarPreviewForm(base64) {
            const imgEl = document.getElementById('previewCapaForm');
            const txtEl = document.getElementById('previewCapaTexto');
            if (base64) {
                imgEl.src = `data:image/png;base64,${base64}`;
                imgEl.classList.remove('hidden');
                txtEl.classList.add('hidden');
            } else {
                imgEl.src = "";
                imgEl.classList.add('hidden');
                txtEl.classList.remove('hidden');
                document.getElementById('capaBase64').value = "";
            }
        }

        // --- CÓDIGO DA CÂMERA ADAPTADO PARA ATENDER OS DOIS LUGARES ---
        async function abrirCamera(contexto) { 
            contextoCamera = contexto;
            if (contexto === 'detalhes') document.getElementById('modalDetalhes').classList.remove('active'); 
            document.getElementById('modalCameraCapa').classList.add('active'); 
            try { 
                streamCamera = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); 
                document.getElementById('videoCamera').srcObject = streamCamera; 
            } catch (err) { 
                alert("Erro na câmera."); 
                fecharCameraCapa(); 
            } 
        }

        async function capturarFoto() { 
            const v = document.getElementById('videoCamera'), c = document.getElementById('canvasCamera'), ctx = c.getContext('2d'); 
            c.width = 300; c.height = 400; 
            const m = Math.min(v.videoWidth, v.videoHeight); 
            ctx.drawImage(v, (v.videoWidth - m)/2, (v.videoHeight - m)/2, m, m, 0, 0, c.width, c.height); 
            const b64 = c.toDataURL('image/jpeg', 0.8).split(',')[1]; 
            
            fecharCameraCapa();
            
            if (contextoCamera === 'formulario') {
                document.getElementById('capaBase64').value = b64;
                atualizarPreviewForm(b64);
            } else {
                await salvarNovaCapa(b64); 
            }
        }

        function fecharCameraCapa() { 
            if (streamCamera) { 
                streamCamera.getTracks().forEach(t => t.stop()); 
                streamCamera = null; 
            } 
            document.getElementById('modalCameraCapa').classList.remove('active'); 
            
            if (contextoCamera === 'detalhes') {
                document.getElementById('modalDetalhes').classList.add('active'); 
            }
        }

        async function salvarNovaCapa(b64) { const { error } = await db.from('livros').update({ capa: b64 }).eq('id', dadosLivroAtual.id); if (error) alert("Erro ao salvar foto"); else { dadosLivroAtual.capa = b64; atualizarCapaVisual(b64); carregarLivros(document.getElementById('pesquisa').value); } }
        
    </script>
</body>
</html>
